name: Keepalive

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping Render health endpoint
        run: |
          curl --fail --silent --show-error --max-time 60 \
            --retry 3 --retry-delay 10 --retry-connrefused \
            https://deepcast.onrender.com/api/health

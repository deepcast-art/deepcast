<!doctype html>
<!-- OG card candidate 3 — "Constellation": the network at a whisper, one gold
     path reaching a new star. 1200x630. App tokens: ink #080c18, gold #c7a96b. -->
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  @font-face { font-family: 'Phoenix'; src: url('../../public/fonts/phoenix-regular.otf') format('opentype'); font-weight: 400; }
  @font-face { font-family: 'Phoenix'; src: url('../../public/fonts/phoenix-medium.otf') format('opentype'); font-weight: 500; }
  @font-face { font-family: 'Garamond Premier Pro Italic'; src: url('../../public/fonts/garamond-premier-pro-italic.ttf') format('truetype'); }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    position: relative;
    background:
      radial-gradient(ellipse 800px 480px at 74% 30%, rgba(199, 169, 107, 0.05), transparent 70%),
      radial-gradient(ellipse 1500px 950px at 50% 55%, #090e1b 0%, #080c18 58%, #05080f 100%);
    font-family: 'Phoenix', sans-serif; color: #dddddd;
  }
  svg.sky { position: absolute; inset: 0; }

  .text {
    position: absolute; left: 92px; bottom: 84px;
    display: flex; flex-direction: column; gap: 26px;
  }
  .brand { font-size: 15px; letter-spacing: 0.44em; color: #c7a96b; font-weight: 500; }
  .line  {
    font-family: 'Garamond Premier Pro Italic', Georgia, serif; font-style: italic;
    font-size: 62px; line-height: 1.14; color: #e6e2d8;
  }
  .sub { font-size: 13px; letter-spacing: 0.3em; color: rgba(221, 221, 221, 0.42); }
</style>
</head>
<body>
  <svg class="sky" width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- dim web -->
    <g fill="#dddddd">
      <circle cx="150" cy="112" r="1.6" opacity=".22"/>
      <circle cx="318" cy="64"  r="1.3" opacity=".16"/>
      <circle cx="447" cy="188" r="1.7" opacity=".24"/>
      <circle cx="585" cy="86"  r="1.4" opacity=".18"/>
      <circle cx="700" cy="238" r="1.5" opacity=".20"/>
      <circle cx="836" cy="120" r="1.4" opacity=".16"/>
      <circle cx="962" cy="330" r="1.6" opacity=".22"/>
      <circle cx="1080" cy="96" r="1.5" opacity=".18"/>
      <circle cx="1122" cy="450" r="1.4" opacity=".16"/>
      <circle cx="890" cy="520" r="1.5" opacity=".18"/>
      <circle cx="248" cy="300" r="1.5" opacity=".18"/>
      <circle cx="70"  cy="420" r="1.3" opacity=".14"/>
      <circle cx="540" cy="330" r="1.4" opacity=".16"/>
      <circle cx="1010" cy="200" r="1.3" opacity=".15"/>
      <circle cx="390" cy="470" r="1.3" opacity=".13"/>
    </g>
    <g stroke="#dddddd" stroke-width="0.6" opacity=".10">
      <line x1="150" y1="112" x2="318" y2="64"/>
      <line x1="318" y1="64"  x2="585" y2="86"/>
      <line x1="447" y1="188" x2="585" y2="86"/>
      <line x1="836" y1="120" x2="1080" y2="96"/>
      <line x1="962" y1="330" x2="1122" y2="450"/>
      <line x1="248" y1="300" x2="447" y2="188"/>
    </g>
    <!-- the gold path: hand to hand to the new star -->
    <g>
      <polyline points="150,368 440,318 700,286 918,208" stroke="#c7a96b" stroke-width="1.4" opacity="0.85"/>
      <circle cx="150" cy="368" r="3.2" fill="#c7a96b" opacity=".8"/>
      <circle cx="440" cy="318" r="3.2" fill="#c7a96b" opacity=".8"/>
      <circle cx="700" cy="286" r="3.2" fill="#c7a96b" opacity=".8"/>
      <!-- the newest star: you -->
      <circle cx="918" cy="208" r="22" fill="#c7a96b" opacity=".10"/>
      <circle cx="918" cy="208" r="10" fill="#c7a96b" opacity=".22"/>
      <circle cx="918" cy="208" r="4.6" fill="#d8c79a"/>
    </g>
  </svg>
  <div class="text">
    <div class="brand">DEEPCAST</div>
    <div class="line">You’ve been given a ticket.</div>
    <div class="sub">NO ALGORITHM, NO FEED · PASSED BY HAND</div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Fix Invite Allocation</title>
  <style>
    body { font-family: monospace; padding: 20px; max-width: 800px; margin: 0 auto; }
    button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    pre { background: #f5f5f5; padding: 15px; border-radius: 5px; }
    .success { color: green; }
    .error { color: red; }
  </style>
</head>
<body>
  <h1>Fix Invite Allocations</h1>

  <div>
    <h2>1. Check Current Allocations</h2>
    <button onclick="checkAllocations()">Check Allocations</button>
    <pre id="current">Click button to check...</pre>
  </div>

  <div>
    <h2>2. Reset All Allocations</h2>
    <p>This will set:</p>
    <ul>
      <li>Creators: 50 invites</li>
      <li>Viewers: 10 invites</li>
    </ul>
    <button onclick="resetAllocations()">Reset All Allocations</button>
    <pre id="result"></pre>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

    const supabase = createClient(
      'https://wmtjgpxhjtbocsmutqqc.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndtdGpncHhoanRib2NzbXV0cXFjIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MTg5NTkxNywiZXhwIjoyMDg3NDcxOTE3fQ.A0o5vJboUAT4ZjDvLY1PXv2XwukrSoOqUN9XQknd2u0'
    )

    window.checkAllocations = async function() {
      const { data, error } = await supabase
        .from('users')
        .select('id, email, name, role, invite_allocation')

      if (error) {
        document.getElementById('current').innerHTML = '<span class="error">Error: ' + error.message + '</span>'
      } else {
        document.getElementById('current').textContent = JSON.stringify(data, null, 2)
      }
    }

    window.resetAllocations = async function() {
      const resultDiv = document.getElementById('result')
      resultDiv.textContent = 'Resetting...'

      // Get all users
      const { data: users, error: fetchError } = await supabase
        .from('users')
        .select('id, email, role')

      if (fetchError) {
        resultDiv.innerHTML = '<span class="error">Error fetching users: ' + fetchError.message + '</span>'
        return
      }

      // Update each user
      const results = []
      for (const user of users) {
        const newAllocation = user.role === 'creator' ? 50 : 10
        const { error: updateError } = await supabase
          .from('users')
          .update({ invite_allocation: newAllocation })
          .eq('id', user.id)

        if (updateError) {
          results.push(`❌ ${user.email}: ${updateError.message}`)
        } else {
          results.push(`✅ ${user.email}: Set to ${newAllocation} invites (${user.role})`)
        }
      }

      resultDiv.innerHTML = '<span class="success">' + results.join('\n') + '</span>'

      // Refresh allocations display
      setTimeout(checkAllocations, 500)
    }
  </script>
</body>
</html>
